name: Quality Gates

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run mypy
        run: python -m mypy src

      - name: Run radon
        run: python -m radon cc src/repo_rag_lab -s -n B
