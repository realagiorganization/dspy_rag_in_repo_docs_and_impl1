name: Python CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Compile sources
        run: python -m compileall src tests

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/test_utilities.py tests/test_repository_rag_bdd.py

      - name: Run smoke test
        env:
          PYTHONPATH: src
        run: python -m repo_rag_lab.cli smoke-test

      - name: Canary failure
        run: |
          echo "intentional failure to verify GitHub Actions red-state detection"
          exit 1
