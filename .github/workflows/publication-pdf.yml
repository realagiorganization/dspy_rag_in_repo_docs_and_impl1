name: Publication PDF

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publication-pdf.yml"
      - "publication/**"
      - "todo-backlog.yaml"
      - "src/repo_rag_lab/exploratorium_translation.py"
      - "src/repo_rag_lab/todo_backlog.py"
      - "src/repo_rag_lab/cli.py"
      - "src/repo_rag_lab/utilities.py"
      - "AGENTS.md"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/publication-pdf.yml"
      - "publication/**"
      - "todo-backlog.yaml"
      - "src/repo_rag_lab/exploratorium_translation.py"
      - "src/repo_rag_lab/todo_backlog.py"
      - "src/repo_rag_lab/cli.py"
      - "src/repo_rag_lab/utilities.py"
      - "AGENTS.md"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
  workflow_dispatch:

jobs:
  publication-pdf:
    name: Build Publication PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            uv.lock

      - name: Sync publication inventories
        run: |
          uv sync --extra azure
          uv run repo-rag sync-todo-backlog --root .
          uv run repo-rag sync-exploratorium-translation --root .

      - name: Restore LaTeX auxiliary cache
        uses: actions/cache@v4
        with:
          path: |
            publication/*.aux
            publication/*.bbl
            publication/*.bcf
            publication/*.blg
            publication/*.fdb_latexmk
            publication/*.fls
            publication/*.log
            publication/*.out
            publication/*.run.xml
            publication/*.toc
          key: latex-aux-${{ runner.os }}-${{ hashFiles('publication/repository-rag-lab-article.tex', 'publication/references.bib', 'publication/Makefile', 'publication/todo-backlog-table.tex', 'publication/exploratorium_translation/exploratorium_translation.tex', 'publication/exploratorium_translation/Makefile', 'publication/exploratorium_translation/generated/exploratorium-content.tex', 'publication/exploratorium_translation/generated/exploratorium-manifest.json', 'todo-backlog.yaml', '.github/workflows/publication-pdf.yml') }}
          restore-keys: |
            latex-aux-${{ runner.os }}-

      - name: Compile article PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: repository-rag-lab-article.tex
          working_directory: publication
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Compile exploratorium translation PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: exploratorium_translation.tex
          working_directory: publication/exploratorium_translation
          latexmk_use_lualatex: true
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload publication PDFs
        id: upload_publication_pdf
        uses: actions/upload-artifact@v6
        with:
          name: publication-pdf
          path: |
            publication/repository-rag-lab-article.pdf
            publication/exploratorium_translation/exploratorium_translation.pdf
          if-no-files-found: error

      - name: Notify Discord about publication PDF
        if: success() && github.event_name != 'pull_request' && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          nodetail: true
          title: Publication PDFs ready
          description: |
            [Artifact download](${{ steps.upload_publication_pdf.outputs['artifact-url'] }})
            [Committed PDF](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/publication/repository-rag-lab-article.pdf)
            [Committed exploratorium PDF](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/publication/exploratorium_translation/exploratorium_translation.pdf)
            [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          url: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/publication/repository-rag-lab-article.pdf
          color: 0x2f855a
