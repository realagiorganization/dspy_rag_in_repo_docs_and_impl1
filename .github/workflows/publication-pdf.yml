name: Publication PDF

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publication-pdf.yml"
      - "publication/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/publication-pdf.yml"
      - "publication/**"
      - "README.md"
  workflow_dispatch:

jobs:
  publication-pdf:
    name: Build Publication PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore LaTeX auxiliary cache
        uses: actions/cache@v4
        with:
          path: |
            publication/*.aux
            publication/*.bbl
            publication/*.bcf
            publication/*.blg
            publication/*.fdb_latexmk
            publication/*.fls
            publication/*.log
            publication/*.out
            publication/*.run.xml
            publication/*.toc
          key: latex-aux-${{ runner.os }}-${{ hashFiles('publication/repository-rag-lab-article.tex', 'publication/references.bib', 'publication/Makefile', '.github/workflows/publication-pdf.yml') }}
          restore-keys: |
            latex-aux-${{ runner.os }}-

      - name: Compile article PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: repository-rag-lab-article.tex
          working_directory: publication
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload publication PDF
        id: upload_publication_pdf
        uses: actions/upload-artifact@v6
        with:
          name: publication-pdf
          path: publication/repository-rag-lab-article.pdf
          if-no-files-found: error

      - name: Notify Discord about publication PDF
        if: success() && github.event_name != 'pull_request' && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          nodetail: true
          title: Publication PDF ready
          description: |
            [Artifact download](${{ steps.upload_publication_pdf.outputs['artifact-url'] }})
            [Committed PDF](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/publication/repository-rag-lab-article.pdf)
            [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          url: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/publication/repository-rag-lab-article.pdf
          color: 0x2f855a
