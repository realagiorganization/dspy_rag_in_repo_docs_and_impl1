name: Rust Wrapper CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust wrapper
        run: cargo build --manifest-path rust-cli/Cargo.toml

      - name: Run Rust wrapper against Python workflow
        run: cargo run --manifest-path rust-cli/Cargo.toml -- ask --question "What does this repository research?"

