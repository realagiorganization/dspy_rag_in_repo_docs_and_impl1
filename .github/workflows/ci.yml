name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  python:
    name: Python Quality, Tests, And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.10"
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            uv.lock

      - name: Sync environment
        run: uv sync --frozen --extra azure

      - name: Compile sources
        run: uv run python -m compileall src tests

      - name: Check Python formatting
        run: uv run ruff format --check src tests

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Lint notebook code cells
        run: uv run nbqa ruff notebooks

      - name: Run mypy
        run: uv run mypy src tests

      - name: Run basedpyright
        run: uv run basedpyright

      - name: Verify repository surfaces
        run: uv run repo-rag verify-surfaces

      - name: Run radon
        run: uv run radon cc src/repo_rag_lab -s -n B

      - name: Run coverage
        run: make coverage

      - name: Run smoke test
        run: uv run repo-rag smoke-test

      - name: Build wheel and source distribution
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  rust-wrapper:
    name: Rust Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.10"
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            uv.lock

      - name: Sync environment
        run: uv sync --frozen --extra azure

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --manifest-path rust-cli/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path rust-cli/Cargo.toml --all-targets -- -D warnings

      - name: Build Rust wrapper
        run: cargo build --manifest-path rust-cli/Cargo.toml

      - name: Run Rust wrapper against packaged workflow
        run: >-
          cargo run --manifest-path rust-cli/Cargo.toml -- ask --question
          "What does this repository research?"
